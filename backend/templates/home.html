{{define "home"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <!-- Tailwind CSS CDN for quick styling -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- HTMX for React-like interactivity without JS complexity -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-indigo-600">{{.Name}}'s Dev Space</h1>
            <div class="flex gap-4">
                <a href="#" class="text-slate-600 hover:text-indigo-600 transition">Home</a>
                <a href="#" class="text-slate-600 hover:text-indigo-600 transition">Projects</a>
                <a href="#" class="text-slate-600 hover:text-indigo-600 transition">Contact</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-12">
        <section class="text-center mb-16">
            <h2 class="text-5xl font-extrabold mb-4 tracking-tight">{{.Title}}</h2>
            <p class="text-xl text-slate-600 max-w-2xl mx-auto leading-relaxed">
                Hi, I'm {{.Name}}. Welcome to my personal playground built with 
                <span class="text-indigo-600 font-semibold">Go</span> and modern frontend tech.
            </p>
        </section>

        <section class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 max-w-2xl mx-auto">
            <h3 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <span class="p-2 bg-indigo-100 rounded-lg text-indigo-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </span>
                About Me
            </h3>
            
            <div id="about-info" class="space-y-4">
                <button 
                    hx-get="/api/about-snippet" 
                    hx-target="#about-info" 
                    hx-swap="innerHTML"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 active:translate-y-0"
                >
                    Load dynamic info with HTMX
                </button>
            </div>
        </section>
    </main>

    <footer class="mt-auto py-8 text-center text-slate-500 text-sm">
        Built with Go 1.26 • Hosted locally
    </footer>
</body>
</html>
{{end}}
